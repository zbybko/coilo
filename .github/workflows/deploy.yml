name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 74c737325974ebf7be5c7b2af1bd9ca8

      - name: Ping IndexNow (Bing, Yandex, Seznam, Naver)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"coilo.de","key":"0d4ebbee7f0707719cbda877810ec92a","urlList":["https://coilo.de/","https://coilo.de/colors","https://coilo.de/about","https://coilo.de/sitemap.xml"]}' \
            -o /dev/null -w "indexnow: %{http_code}\n" || true
